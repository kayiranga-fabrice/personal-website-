name: Deploy static website to Azure Web App - orbixolutions

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Checkout the repository
      - uses: actions/checkout@v4

      # Step 2: Login to Azure using service principal JSON
      - name: Login to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      # Step 3: Deploy all files to Azure Web App
      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: orbixolutions       # Your Azure App Service name
          slot-name: Production
          package: .                   # Deploy all repository files
          app-name: orbixolutions
          slot-name: Production
          package: .
